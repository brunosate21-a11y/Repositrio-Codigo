name: steadycom
description: >
  Predicts steady-state community composition and metabolic fluxes
  using genome-scale metabolic models. Computes growth rates at
  community steady state.
url: https://github.com/hongzhonglu/SteadyCom
authors:
  - Bruno Ferreira
input:
  models: >
    genome-scale metabolic models in SBML XML format (.xml) for each
    community member.
output:
  results: steady-state flux and growth rate predictions for the community.
params:
  media: >
    Growth media composition for steady-state simulation (e.g. ``M9``).
  extra: >
    Additional command line arguments passed to SteadyCom (optional).