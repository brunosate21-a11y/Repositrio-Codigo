name: checkm
description: >
  Assesses the quality of microbial genomes recovered from metagenomes.
  Estimates completeness and contamination of genome bins using lineage-specific
  marker genes.
url: https://ecogenomics.github.io/CheckM/
authors:
  - Bruno Ferreira
input:
  bins: directory containing genome bins in FASTA format.
output:
  report: CheckM quality report with completeness and contamination estimates.
params:
  extra: >
    Additional command line arguments passed to CheckM (optional).