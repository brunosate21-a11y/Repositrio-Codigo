name: memote
description: >
  Tests and scores genome-scale metabolic models (GEMs) for quality and
  standards compliance. Generates a report with multiple quality metrics.
url: https://memote.readthedocs.io/en/latest/
authors:
  - Bruno Ferreira
input:
  model: a genome-scale metabolic model in SBML XML format (.xml).
output:
  report: a memote quality report in HTML or JSON format.
params:
  extra: >
    Additional command line arguments passed to memote (optional).