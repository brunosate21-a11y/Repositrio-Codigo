name: micom
description: >
  Builds and simulates community metabolic models from individual
  genome-scale metabolic models. Predicts growth rates and metabolic
  fluxes in microbial communities.
url: https://micom-dev.github.io/micom/
authors:
  - Bruno Ferreira
input:
  models: >
    genome-scale metabolic models in SBML XML format (.xml) for each
    community member.
output:
  community_model: a MICOM community metabolic model file.
params:
  media: >
    Growth media composition used for community simulation (e.g. ``M9``).
  extra: >
    Additional command line arguments passed to MICOM (optional).