name: smetana
description: >
  Computes metabolic interactions between species in a microbial community.
  Uses genome-scale metabolic models to score species metabolic exchanges.
url: https://smetana.readthedocs.io/en/latest/
authors:
  - Bruno Ferreira
input:
  models: >
    one or more genome-scale metabolic models in SBML XML format (.xml)
    representing the microbial community members.
output:
  interactions: a table of predicted metabolic interactions between species.
params:
  media: >
    Growth media composition for the community simulation (e.g. ``M9``).
  extra: >
    Additional command line arguments passed to SMETANA (optional).