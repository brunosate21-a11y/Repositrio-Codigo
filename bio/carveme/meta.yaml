name: carveme
description: >
  Reconstructs genome-scale metabolic models (GEMs) from genome sequences
  using CarveMe. Takes a genome FASTA file as input and produces a metabolic
  model in SBML XML format.
url: https://carveme.readthedocs.io/en/latest/
authors:
  - Bruno Ferreira
input:
  genome: a genome FASTA file (.fna) for metabolic model reconstruction.
output:
  model: a genome-scale metabolic model in SBML XML format (.xml).
params:
  solver: >
    LP solver to use for model reconstruction (e.g. ``cplex``, ``gurobi``, ``glpk``).
  media: >
    Growth media composition to use during model reconstruction
    (e.g. ``M9``, ``LB``).
notes: >
  Requires 4 threads by default. The solver must be available in the conda
  environment. CarveMe uses a universal model template to carve
  organism-specific models.